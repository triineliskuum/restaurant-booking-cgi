<!doctype html>
<html lang="et" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>Restobroneerimine</title>
    <style>
        .grid { display: grid; grid-template-columns: repeat(7, 90px); gap: 10px; margin-top: 16px; }
        .table { border: 1px solid #999; padding: 10px; border-radius: 12px; }
        .busy { opacity: 0.35; }
        .recommended { border-width: 3px; }
        .table { white-space: normal; }
        .table div { font-size: 12px; }
    </style>
</head>
<body>
<h1>Saaliplaan</h1>
<p>Hallid lauad on hetkel broneeritud (random demoandmed).</p>

<div th:if="${error != null}" th:text="${error}" style="color:red;"></div>
<div th:if="${success != null}" th:text="${success}" style="color:green;"></div>

<form method="get" action="/">
    <label>Aeg:
        <input type="datetime-local" name="dt" th:value="${dt}">
    </label>
    <label>Inimesi:
        <input type="number" name="people" min="1" th:value="${people}">
    </label>
    <fieldset>
        <legend>Eelistused</legend>

        <label>
            <input type="checkbox" name="prefs" value="AKNAALL"
                   th:checked="${prefs != null and prefs.contains(T(ee.cgi.broneerimine.domain.Preference).AKNAALL)}" />
            Aknakoht
        </label>

        <label>
            <input type="checkbox" name="prefs" value="VAIKNENURK"
                   th:checked="${prefs != null and prefs.contains(T(ee.cgi.broneerimine.domain.Preference).VAIKNENURK)}" />
            Vaikne nurk
        </label>

        <label>
            <input type="checkbox" name="prefs" value="LASTENURGALAHEDAL"
                   th:checked="${prefs != null and prefs.contains(T(ee.cgi.broneerimine.domain.Preference).LASTENURGALAHEDAL)}" />
            Lasteala lähedal
        </label>

        <label>
            <input type="checkbox" name="prefs" value="LIHTNELIGIPAAS"
                   th:checked="${prefs != null and prefs.contains(T(ee.cgi.broneerimine.domain.Preference).LIHTNELIGIPAAS)}" />
            Ligipääsetav
        </label>
    </fieldset>
    <button type="submit">Soovita</button>
</form>

<div class="grid">
    <div th:each="t : ${tables}"
         th:class="'table ' +
         (${busyIds.contains(t.id)} ? 'busy ' : '') +
         (${recommendedId != null and recommendedId.equals(t.id)} ? 'recommended' : '')">
        <div><b th:text="${t.label}">T1</b></div>
        <div th:text="'Kohti: ' + ${t.capacity}">Kohti: 4</div>
        <div th:text="${t.zone}">INSIDE</div>

        <div th:if="${t.features != null and !t.features.isEmpty()}"
             th:text="${t.features}"></div>
    </div>
</div>

<div th:if="${recommendedId != null and recommendedId.equals(t.id) and !busyIds.contains(t.id)}">
    <form method="post" action="/reserve">
        <input type="hidden" name="tableId" th:value="${t.id}">
        <input type="hidden" name="dt" th:value="${dt}">
        <input type="hidden" name="people" th:value="${people}">
        <!-- prefs hiddenid jätame praegu ära; pole vaja broneeringu salvestamiseks -->
        <button type="submit">Broneeri see laud</button>
    </form>
</div>
</body>
</html>
